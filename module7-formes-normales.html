<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M7 — Formes normales | Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#2d333b;--accent:#06b6d4;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--purple:#a78bfa;--txt:#e6edf3;--txt2:#8b949e;--txt3:#484f58;--radius:10px;--font:-apple-system,'Segoe UI',sans-serif;--mono:'Fira Code',monospace}
body{background:var(--bg);color:var(--txt);font-family:var(--font);line-height:1.65;min-height:100vh}a{color:var(--accent);text-decoration:none}
.header{background:var(--bg2);border-bottom:1px solid var(--bg3);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);flex-wrap:wrap}
.header .back{font-size:1.3rem;opacity:.7}.header h1{font-size:1.05rem;font-weight:600;color:var(--accent)}
.badge{background:rgba(6,182,212,.1);color:var(--accent);font-size:.68rem;padding:3px 10px;border-radius:20px;font-weight:600}
.cours-link{margin-left:auto;background:rgba(167,139,250,.12);color:var(--purple);padding:5px 14px;border-radius:7px;font-size:.78rem;font-weight:600;border:1px solid rgba(167,139,250,.2)}
.score{display:flex;gap:10px;font-size:.82rem;color:var(--txt2);margin-left:12px}.score .g{color:var(--green);font-weight:700}.score .r{color:var(--red);font-weight:700}.score .o{color:var(--orange);font-weight:700}
.container{max-width:860px;margin:0 auto;padding:20px 20px 80px}
.qcard{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:20px;margin-bottom:16px;transition:border-color .3s}.qcard.correct{border-color:var(--green)}.qcard.wrong{border-color:var(--red)}
.qhdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}.qnum{background:var(--bg3);color:var(--accent);font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:6px}
.qdiff{font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:600}.qdiff.easy{background:rgba(34,197,94,.1);color:var(--green)}.qdiff.medium{background:rgba(245,158,11,.1);color:var(--orange)}.qdiff.hard{background:rgba(239,68,68,.1);color:var(--red)}
.qtext{font-size:.92rem;margin-bottom:14px;line-height:1.7}.qtext code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:.88em}
.opts{display:flex;flex-direction:column;gap:8px}.opt{background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:11px 16px;cursor:pointer;font-size:.88rem;transition:.2s;display:flex;align-items:center;gap:10px}
.opt:hover:not(.locked){border-color:var(--accent)}.opt.sel{border-color:var(--accent);background:rgba(6,182,212,.08)}
.opt.c-right{border-color:var(--green);background:rgba(34,197,94,.08)}.opt.c-wrong{border-color:var(--red);background:rgba(239,68,68,.06)}
.opt .marker{width:20px;height:20px;border-radius:50%;border:2px solid var(--txt3);display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.opt.sel .marker{border-color:var(--accent);background:var(--accent);color:#fff}.opt.c-right .marker{border-color:var(--green);background:var(--green);color:#fff}.opt.c-wrong .marker{border-color:var(--red);background:var(--red);color:#fff}
.input-row{display:flex;gap:8px}.input-row input{background:var(--bg);border:1px solid var(--bg3);color:var(--txt);padding:9px 14px;border-radius:8px;font-size:.9rem;font-family:var(--mono);flex:1;outline:none}.input-row input:focus{border-color:var(--accent)}.input-row input.c-right{border-color:var(--green)}.input-row input.c-wrong{border-color:var(--red)}
.submit-btn{background:var(--accent);color:#fff;border:none;padding:9px 20px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:var(--font)}.submit-btn:disabled{opacity:.4}
.expl{margin-top:12px;padding:12px 16px;border-radius:8px;font-size:.82rem;line-height:1.6;display:none}.expl.show{display:block}
.expl.right{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);color:#a7f3d0}.expl.wrong{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);color:#fca5a5}
.errcnt{font-size:.7rem;color:var(--orange);margin-left:auto}
.rstq{margin-top:8px;text-align:right}.rstq button{background:transparent;border:1px dashed var(--txt3);color:var(--txt2);border-radius:6px;padding:4px 10px;font-size:.72rem;cursor:pointer;font-family:var(--font)}.rstq button:hover{border-color:var(--accent);color:var(--accent)}
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg3);padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:16px;z-index:100}
.footer .pt{font-size:.82rem;color:var(--txt2)}.footer .pt b{color:var(--accent)}
.pbar{flex:1;max-width:260px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}.pfill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.fbtn{background:transparent;border:1px solid var(--txt3);color:var(--txt2);border-radius:8px;padding:5px 14px;font-size:.78rem;cursor:pointer;font-family:var(--font);font-weight:600}.fbtn:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:600px){.header{padding:10px 14px;gap:8px}.container{padding:14px 10px 80px}}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back">←</a><h1>M7 — Formes normales</h1><span class="badge">FND · FNC · simplification</span>
  <a href="cours7-formes-normales.html" class="cours-link">📚 Cours</a>
  <div class="score"><span>✓ <span class="g" id="sR">0</span></span><span>✗ <span class="r" id="sW">0</span></span><span>↻ <span class="o" id="sE">0</span></span></div>
</div>
<div class="container"><div id="qc"></div></div>
<div class="footer"><span class="pt"><b id="fp">0</b>/<b id="ft">14</b></span><div class="pbar"><div class="pfill" id="pb" style="width:0%"></div></div><button class="fbtn" onclick="resetAll()">🗑️ Reset</button></div>
<script>
const STATE_KEY="nl_mod7_state";
const Q=[
{id:1,type:"mcq",diff:"easy",text:"Un <b>littéral</b> est :",
 opts:["Une conjonction de variables","Une variable propositionnelle ou sa négation","Un connecteur logique","Une tautologie"],
 answer:1,explanation:"Un littéral (ou atome) est une variable propositionnelle p ou sa négation ¬p. Exemples : a, ¬b, ¬c sont des littéraux."},

{id:2,type:"mcq",diff:"easy",text:"Une <b>FND</b> (forme normale disjonctive) est :",
 opts:["Une conjonction de disjonctions de littéraux","Une disjonction de conjonctions de littéraux","Une négation de conjonctions","Une table de vérité"],
 answer:1,explanation:"FND = disjonction (∨) de conjonctions (∧) de littéraux. Ex : (a ∧ ¬b) ∨ (¬a ∧ c). Les OU sont « à l'extérieur », les ET « à l'intérieur »."},

{id:3,type:"mcq",diff:"easy",text:"Parmi ces formules, laquelle est une FNC ?",
 opts:["(a ∧ b) ∨ (¬c)","(a ∨ b) ∧ (¬c ∨ d)","¬(a ∧ b)","a → b"],
 answer:1,explanation:"FNC = conjonction (∧) de disjonctions (∨) de littéraux. (a∨b) ∧ (¬c∨d) est bien un produit de sommes."},

{id:4,type:"mcq",diff:"easy",text:"La formule <code>(p ∧ q) ∨ (¬q)</code> est-elle une FND ?",
 opts:["Oui","Non, car ¬q n'est pas une conjonction","Non, car il y a un ∨ à l'intérieur","Non, car elle contient →"],
 answer:0,explanation:"Oui. Un littéral seul (¬q) est un cas particulier de conjonction à un seul terme. (p∧q) ∨ (¬q) est bien une disjonction de conjonctions de littéraux."},

{id:5,type:"mcq",diff:"medium",text:"Pour construire la <b>FND</b> d'une formule F par table de vérité, on regarde les lignes où :",
 opts:["F = 0, et on écrit la disjonction des littéraux","F = 1, et on écrit la conjonction des littéraux pour chaque ligne, puis on fait la disjonction","F = 1, et on écrit la disjonction des littéraux pour chaque ligne","F = 0, et on écrit la conjonction des littéraux inversés"],
 answer:1,explanation:"FND : on prend chaque ligne où F=1, on écrit la <b>conjonction</b> des variables (positives si 1, niées si 0), puis on fait la <b>disjonction</b> de toutes ces conjonctions."},

{id:6,type:"mcq",diff:"medium",text:"Pour construire la <b>FNC</b> par table de vérité, on regarde les lignes où :",
 opts:["F = 1, on écrit une conjonction pour chaque","F = 0, on écrit une disjonction avec les variables inversées pour chaque, puis on fait la conjonction","F = 0, on écrit une conjonction pour chaque","F = 1, on inverse tout"],
 answer:1,explanation:"FNC : lignes où F=0. Pour chaque, on écrit une <b>disjonction</b> avec les variables <b>inversées</b> (0→variable positive, 1→négation). Puis conjonction de tout."},

{id:7,type:"mcq",diff:"medium",text:"Le système <code>{¬, ∧, ∨}</code> est dit :",
 opts:["Minimal","Complet","Incomplet","Redondant uniquement"],
 answer:1,explanation:"Un système de connecteurs est <b>complet</b> si toute formule peut s'exprimer uniquement avec ces connecteurs. {¬, ∧, ∨} est complet car → et ⟷ peuvent s'y réécrire."},

{id:8,type:"mcq",diff:"medium",text:"Le système <code>{¬, ∧}</code> est-il complet ?",
 opts:["Oui, grâce aux lois de De Morgan","Non, il manque le ∨","Non, il manque le →","Seulement si on ajoute ⟷"],
 answer:0,explanation:"Oui. Par De Morgan : a ∨ b eq ¬(¬a ∧ ¬b). Donc ∨ se reconstruit à partir de ¬ et ∧. Le système est complet."},

{id:9,type:"mcq",diff:"medium",text:"Soit F dont la table de vérité donne :<br><code>a=0,b=0→1 | a=0,b=1→0 | a=1,b=0→1 | a=1,b=1→0</code><br>Quelle est la FND de F ?",
 opts:["(¬a ∧ ¬b) ∨ (a ∧ ¬b)","(a ∨ ¬b) ∧ (¬a ∨ ¬b)","(¬a ∧ b) ∨ (a ∧ b)","¬b"],
 answer:0,explanation:"Lignes où F=1 : (0,0) et (1,0). Conjonctions : (¬a∧¬b) et (a∧¬b). FND = (¬a∧¬b) ∨ (a∧¬b). Simplification : ¬b."},

{id:10,type:"mcq",diff:"medium",text:"Avec la même table, quelle est la FNC de F ?",
 opts:["(a ∨ ¬b) ∧ (¬a ∨ ¬b)","(¬a ∧ ¬b) ∨ (a ∧ ¬b)","(a ∧ ¬b)","¬b"],
 answer:0,explanation:"Lignes où F=0 : (0,1) et (1,1). On inverse : (a∨¬b) et (¬a∨¬b). FNC = (a∨¬b) ∧ (¬a∨¬b). Simplification : ¬b."},

{id:11,type:"mcq",diff:"hard",text:"La conversion FNC → FND peut augmenter la taille de la formule de manière :",
 opts:["Linéaire","Polynomiale","Exponentielle","La taille reste identique"],
 answer:2,explanation:"Une FNC à n termes peut donner une FND à 2<sup>n</sup> termes par distributivité. L'explosion est <b>exponentielle</b>."},

{id:12,type:"mcq",diff:"hard",text:"Soit A = ((¬a∨b) ∧ c) → (a ∧ ¬b). Sa FND simplifiée est :",
 opts:["¬c ∨ (a ∧ ¬b)","(a ∧ ¬b) ∧ ¬c","c → (a ∧ ¬b)","a ∨ ¬b ∨ ¬c"],
 answer:0,explanation:"Par table de vérité : 5 lignes à 1. Après factorisation des 4 termes contenant ¬c et ajout du terme (a∧¬b∧c), on obtient A eq ¬c ∨ (a ∧ ¬b)."},

{id:13,type:"mcq",diff:"hard",text:"La FNC de cette même formule A simplifiée est :",
 opts:["(¬c ∨ a) ∧ (¬c ∨ ¬b)","¬c ∧ (a ∨ ¬b)","(a ∨ ¬c) ∧ (¬a ∨ ¬b ∨ ¬c)","(a ∧ ¬b) ∨ ¬c"],
 answer:2,explanation:"FNC de A par les lignes à 0 : (a∨b∨¬c) ∧ (a∨¬b∨¬c) ∧ (¬a∨¬b∨¬c). Les deux premiers simplifient en (a∨¬c). Résultat : (a∨¬c) ∧ (¬a∨¬b∨¬c)."},

{id:14,type:"mcq",diff:"hard",text:"La formule <code>p ∨ (q ∧ (r ∨ s))</code> est-elle une FND ?",
 opts:["Oui","Non, car (r ∨ s) est une disjonction à l'intérieur d'une conjonction"],
 answer:1,explanation:"Non. Dans une FND, les ∨ ne doivent apparaître qu'au niveau supérieur. Ici, (r∨s) est imbriqué dans une conjonction q∧(r∨s). Il faudrait distribuer."}
];
let state;
function loadState(){try{state=JSON.parse(localStorage.getItem(STATE_KEY))||{}}catch(e){state={}}if(!state.answered)state={answered:{},right:0,wrong:0,errorCounts:{}}}
function saveState(){localStorage.setItem(STATE_KEY,JSON.stringify(state))}
function render(){loadState();const c=document.getElementById("qc");c.innerHTML="";let done=0;Q.forEach((q,qi)=>{const ans=state.answered[q.id];const isDone=ans!==undefined;if(isDone)done++;const ec=state.errorCounts[q.id]||0;const div=document.createElement("div");div.className="qcard"+(isDone?(ans===true?" correct":" wrong"):"");let inner=`<div class="qhdr"><span class="qnum">Q${q.id}</span><span class="qdiff ${q.diff}">${q.diff}</span>${ec>0?`<span class="errcnt">↻ ${ec}</span>`:""}</div><div class="qtext">${q.text}</div>`;if(q.type==="mcq"){inner+=`<div class="opts">`;q.opts.forEach((o,oi)=>{let cls="opt";if(isDone){cls+=" locked";if(oi===q.answer)cls+=" c-right";else if(ans===false&&state.answered[q.id+"_sel"]===oi)cls+=" c-wrong";}inner+=`<div class="${cls}" onclick="pickMCQ(${q.id},${oi})"><div class="marker">${isDone?(oi===q.answer?"✓":(state.answered[q.id+"_sel"]===oi?"✗":"")):"ABCD"[oi]}</div><span>${o}</span></div>`;});inner+="</div>";}else{const val=isDone?(state.answered[q.id+"_val"]||""):"";inner+=`<div class="input-row"><input id="inp${q.id}" value="${val}" placeholder="Réponse..." ${isDone?"disabled":""} class="${isDone?(ans?"c-right":"c-wrong"):""}" onkeydown="if(event.key==='Enter')submitInput(${q.id})"><button class="submit-btn" onclick="submitInput(${q.id})" ${isDone?"disabled":""}>Vérifier</button></div>`;}inner+=`<div class="expl ${isDone?"show":""} ${isDone?(ans?"right":"wrong"):""}">${isDone?(ans?"✅ Correct — ":"❌ Incorrect — ")+q.explanation:""}</div>`;if(isDone)inner+=`<div class="rstq"><button onclick="resetQ(${q.id})">↻ Refaire</button></div>`;div.innerHTML=inner;c.appendChild(div);});updateScore(done);}
function pickMCQ(qid,oi){const q=Q.find(x=>x.id===qid);if(!q||state.answered[qid]!==undefined)return;const correct=oi===q.answer;state.answered[qid]=correct;state.answered[qid+"_sel"]=oi;if(correct)state.right++;else{state.wrong++;state.errorCounts[qid]=(state.errorCounts[qid]||0)+1;}saveState();render();}
function submitInput(qid){const q=Q.find(x=>x.id===qid);if(!q||state.answered[qid]!==undefined)return;const inp=document.getElementById("inp"+qid);const val=inp.value.trim();if(!val)return;const correct=q.accept.some(a=>val.toLowerCase()===a.toLowerCase());state.answered[qid]=correct;state.answered[qid+"_val"]=val;if(correct)state.right++;else{state.wrong++;state.errorCounts[qid]=(state.errorCounts[qid]||0)+1;}saveState();render();}
function resetQ(qid){delete state.answered[qid];delete state.answered[qid+"_sel"];delete state.answered[qid+"_val"];state.right=0;state.wrong=0;Q.forEach(qq=>{const a=state.answered[qq.id];if(a===true)state.right++;else if(a===false)state.wrong++;});saveState();render();}
function resetAll(){if(!confirm("Réinitialiser ce module ?"))return;localStorage.removeItem(STATE_KEY);render();}
function updateScore(done){document.getElementById("sR").textContent=state.right;document.getElementById("sW").textContent=state.wrong;const te=Object.values(state.errorCounts||{}).reduce((a,b)=>a+b,0);document.getElementById("sE").textContent=te;document.getElementById("fp").textContent=done;document.getElementById("pb").style.width=Math.round(done/Q.length*100)+"%";}
render();
</script>
</body>
</html>
