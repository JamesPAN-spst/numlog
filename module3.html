<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>M3 — Complément à deux | Quiz</title><style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1e293b;--bg4:#334155;--accent:#3b82f6;--accent2:#2563eb;--accent-dim:rgba(59,130,246,.1);--green:#22c55e;--red:#ef4444;--orange:#f97316;--cyan:#06b6d4;--purple:#a78bfa;--txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;--radius:10px;--font:-apple-system,"Segoe UI","Noto Sans SC",sans-serif;--mono:"Fira Code","JetBrains Mono",monospace}
body{background:var(--bg);color:var(--txt);font-family:var(--font);line-height:1.65;min-height:100vh}a{color:var(--accent);text-decoration:none}
.header{background:var(--bg2);border-bottom:1px solid rgba(59,130,246,.15);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}.header .back{font-size:1.3rem;opacity:.7}.header h1{font-size:1.05rem;font-weight:600;color:var(--accent)}.header .badge{background:var(--accent-dim);color:var(--accent);font-size:.68rem;padding:3px 10px;border-radius:20px;font-weight:600}.cours-link{margin-left:auto;background:rgba(167,139,250,.12);color:var(--purple);padding:5px 14px;border-radius:7px;font-size:.78rem;font-weight:600;border:1px solid rgba(167,139,250,.2)}.cours-link:hover{background:rgba(167,139,250,.2);text-decoration:none}.score{display:flex;gap:10px;font-size:.82rem;color:var(--txt2);margin-left:12px}.score .g{color:var(--green);font-weight:700}.score .r{color:var(--red);font-weight:700}.score .o{color:var(--orange);font-weight:700}
.container{max-width:880px;margin:0 auto;padding:20px 20px 80px}
.sec{font-size:1.1rem;font-weight:700;margin:28px 0 14px;padding-left:12px;border-left:3px solid var(--accent);display:flex;align-items:center;gap:10px}.sec .cnt{font-size:.72rem;background:var(--bg3);color:var(--txt2);padding:2px 10px;border-radius:20px}
.qcard{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;transition:border-color .3s}.qcard.ok{border-color:rgba(34,197,94,.35)}.qcard.fail{border-color:rgba(239,68,68,.35)}
.qhead{padding:14px 18px 10px;display:flex;align-items:flex-start;gap:10px}.qn{font-size:.68rem;font-weight:700;color:var(--bg);background:var(--accent);min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}.qn.dok{background:var(--green)}.qn.dng{background:var(--red)}.qtxt{font-size:.9rem;flex:1}.qtxt code{background:var(--bg);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:.84rem;color:var(--cyan)}.dtag{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}.dtag.easy{background:rgba(34,197,94,.12);color:var(--green)}.dtag.medium{background:rgba(249,115,22,.12);color:var(--orange)}.dtag.hard{background:rgba(239,68,68,.12);color:var(--red)}.errcnt{font-size:.65rem;color:var(--orange);margin-left:6px}
.opts{padding:4px 18px 14px}.obtn{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:10px 14px;margin:5px 0;color:var(--txt);font-size:.86rem;cursor:pointer;transition:.2s;font-family:var(--font);line-height:1.5}.obtn:hover:not(.lk){background:var(--bg3);border-color:rgba(59,130,246,.3)}.obtn code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:.82rem;color:var(--cyan)}.obtn.sg{background:rgba(34,197,94,.08);border-color:var(--green);color:var(--green)}.obtn.sw{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red)}.obtn.rv{border-color:rgba(34,197,94,.25);color:var(--green)}.obtn.lk{cursor:default;opacity:.85}
.iarea{padding:4px 18px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.iarea input{flex:1;min-width:160px;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:10px 14px;color:var(--txt);font-family:var(--mono);font-size:.88rem;outline:none;transition:.2s}.iarea input:focus{border-color:var(--accent)}.iarea input.ig{border-color:var(--green);color:var(--green)}.iarea input.ir{border-color:var(--red);color:var(--red)}.sbtn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:.84rem;font-family:var(--font);transition:.2s}.sbtn:hover{background:var(--accent2)}.sbtn:disabled{opacity:.4;cursor:default}
.builder{padding:4px 18px 14px}.bit-board{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}.bit{width:38px;height:38px;border-radius:6px;border:2px solid var(--bg3);background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:1rem;font-weight:700;cursor:pointer;transition:.15s;user-select:none;color:var(--txt2)}.bit:hover{border-color:var(--accent)}.bit.on{background:var(--accent);border-color:var(--accent);color:#fff}.bit.lk{cursor:default;opacity:.8}.bit-label{display:flex;gap:4px;margin-bottom:2px}.bit-label span{width:38px;text-align:center;font-size:.6rem;color:var(--txt3);font-family:var(--mono)}.builder .result{font-size:.85rem;color:var(--txt2);margin:6px 0}.builder .result b{color:var(--cyan);font-family:var(--mono)}
.expl{padding:0 18px 14px;display:none}.expl.show{display:block}.ebox{background:rgba(59,130,246,.06);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 16px;font-size:.84rem;color:var(--txt2);line-height:1.7}.ebox code{background:var(--bg);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:.8rem;color:var(--cyan)}
.rstq{padding:0 18px 12px}.rstq button{background:transparent;border:1px dashed var(--txt3);color:var(--txt2);border-radius:6px;padding:5px 12px;font-size:.75rem;cursor:pointer;font-family:var(--font);transition:.2s}.rstq button:hover{border-color:var(--accent);color:var(--accent);border-style:solid}
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg3);padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:16px;z-index:100}.footer .pt{font-size:.82rem;color:var(--txt2)}.footer .pt b{color:var(--accent)}.pbar{flex:1;max-width:260px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}.pfill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}.fbtn{background:transparent;border:1px solid var(--txt3);color:var(--txt2);border-radius:8px;padding:5px 14px;font-size:.78rem;cursor:pointer;font-family:var(--font);font-weight:600;transition:.2s}.fbtn:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:600px){.header{padding:10px 14px;gap:8px;flex-wrap:wrap}.header h1{font-size:.9rem}.container{padding:14px 10px 80px}.bit{width:32px;height:32px;font-size:.85rem}.bit-label span{width:32px}}</style></head><body><div class="header"><a href="index.html" class="back">←</a><h1>M3 — Complément à deux</h1><span class="badge">CA2 · OVERFLOW</span><a href="courses3.html" class="cours-link">📚 Cours</a><div class="score"><span>✓ <span class="g" id="sR">0</span></span><span>✗ <span class="r" id="sW">0</span></span><span>↻ <span class="o" id="sE">0</span></span></div></div><div class="container"><div class="sec">🧠 Quiz — 15 questions <span class="cnt" id="progTxt">0 / 15</span></div><div id="qc"></div></div><div class="footer"><span class="pt"><b id="fp">0</b> / <b id="ft">15</b></span><div class="pbar"><div class="pfill" id="pb" style="width:0%"></div></div><button class="fbtn" onclick="resetAll()">🗑️ Réinitialiser</button></div><script>const Q=[{"id": 1, "type": "bits", "diff": "easy", "text": "Encoder <code>44</code> en CA2 sur 8 bits.", "bits": 8, "target": 44, "explanation": "44=32+8+4=<b>00101100</b>"}, {"id": 2, "type": "bits", "diff": "medium", "text": "Encoder <code>-63</code> en CA2₈.<br><small>63=00111111→inverser→+1</small>", "bits": 8, "target": 193, "explanation": "63=00111111→11000000+1=<b>11000001</b>=193"}, {"id": 3, "type": "bits", "diff": "medium", "text": "Encoder <code>-44</code> en CA2₈.", "bits": 8, "target": 212, "explanation": "44=00101100→11010011+1=<b>11010100</b>=212"}, {"id": 4, "type": "input", "diff": "medium", "text": "Décoder CA2₈ <code>10011001</code>.", "answer": "-103", "accept": ["-103"], "explanation": "MSB=1→négatif. Inv 01100110+1=01100111=103→<b>-103</b>"}, {"id": 5, "type": "input", "diff": "easy", "text": "Plage CA2 8 bits ?<br><small>Format: min,max</small>", "answer": "-128,127", "accept": ["-128,127", "-128, 127"], "explanation": "-2⁷ à 2⁷-1 = <b>-128,127</b>"}, {"id": 6, "type": "input", "diff": "medium", "text": "<code>127-44</code> en CA2₈ = ?", "answer": "83", "accept": ["83"], "explanation": "01111111+11010100=1 01010011→ignorer retenue→<b>83</b>"}, {"id": 7, "type": "mcq", "diff": "medium", "text": "63+65 en CA2₈ :", "options": ["128", "Overflow", "-128", "0"], "answer": 1, "explanation": "Deux positifs→résultat négatif→<b>overflow</b>."}, {"id": 8, "type": "mcq", "diff": "medium", "text": "70+70 en CA2₈ :", "options": ["140", "Overflow", "-116", "Erreur"], "answer": 1, "explanation": "140>127, MSB≠retenue→<b>overflow</b>."}, {"id": 9, "type": "mcq", "diff": "medium", "text": "70-71 en CA2₈ :", "options": ["-1", "1", "Overflow", "0"], "answer": 0, "explanation": "Signes≠→pas d overflow. Résultat=<b>-1</b>=11111111."}, {"id": 10, "type": "mcq", "diff": "hard", "text": "Détection overflow CA2 :", "options": ["Bit de signe ≠ 9ᵉ bit", "Résultat = 0", "Retenue", "> 8 bits"], "answer": 0, "explanation": "Overflow ⟺ bit de signe ≠ retenue sortante."}, {"id": 11, "type": "input", "diff": "hard", "text": "<code>127-36</code> en CA2₈ = ?", "answer": "91", "accept": ["91"], "explanation": "01111111+11011100=1 01011011→<b>91</b>"}, {"id": 12, "type": "mcq", "diff": "easy", "text": "MSB en CA2 indique :", "options": ["Parité", "Signe", "Magnitude", "Exposant"], "answer": 1, "explanation": "MSB=0→positif, MSB=1→négatif."}, {"id": 13, "type": "input", "diff": "medium", "text": "<code>34-72</code> en CA2₈.", "answer": "-38", "accept": ["-38"], "explanation": "00100010+10111000=11011010→négatif, val=00100110=38→<b>-38</b>"}, {"id": 14, "type": "mcq", "diff": "hard", "text": "a-b en CA2 se calcule :", "options": ["a + CA2(-b)", "a XOR b", "a - b direct", "a + b + 1"], "answer": 0, "explanation": "Soustraire = additionner le <b>complément à 2</b>."}, {"id": 15, "type": "mcq", "diff": "easy", "text": "Signes différents → overflow :", "options": ["Possible", "Impossible", "Toujours", "Dépend"], "answer": 1, "explanation": "Overflow seulement si <b>même signe</b>."}];const SK="nl_m3";let S=loadS();
function loadS(){try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s)}catch(e){}return{answered:{},right:0,wrong:0,errors:{}}}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}
function render(only){const c=document.getElementById("qc");if(!only)c.innerHTML="";const qs=only?Q.filter(q=>only.includes(q.id)):Q;qs.forEach(q=>{const card=document.createElement("div");card.className="qcard";card.id="c-"+q.id;const a=S.answered[q.id];if(a!==undefined)card.classList.add(a?"ok":"fail");let nc="qn";if(a===true)nc+=" dok";else if(a===false)nc+=" dng";const dl=q.diff==="easy"?"Facile":q.diff==="medium"?"Moyen":"Difficile";const errs=S.errors[q.id]||0;const errH=errs>0?"<span class=\"errcnt\">↻"+errs+"</span>":"";let h="<div class=\"qhead\"><div class=\""+nc+"\">"+q.id+"</div><div class=\"qtxt\">"+q.text+"</div><span class=\"dtag "+q.diff+"\">"+dl+"</span>"+errH+"</div>";if(q.type==="mcq"){h+="<div class=\"opts\">";q.options.forEach((o,i)=>{let cl="obtn";if(a!==undefined){cl+=" lk";if(i===q.answer)cl+=" rv";if(a===false&&S.answered[q.id+"_p"]===i)cl+=" sw";if(a===true&&i===q.answer)cl="obtn lk sg"}h+="<button class=\""+cl+"\" "+(a!==undefined?"disabled":"")+" onclick=\"pickMCQ("+q.id+","+i+")\">"+o+"</button>"});h+="</div>"}else if(q.type==="input"){const lk=a!==undefined;const ic=a===true?"ig":a===false?"ir":"";const sv=lk?(S.answered[q.id+"_v"]||"").replace(/"/g,"&quot;"):"";h+="<div class=\"iarea\"><input type=\"text\" id=\"i-"+q.id+"\" class=\""+ic+"\" placeholder=\"Réponse...\" "+(lk?"disabled":"")+" "+(lk?"value=\""+sv+"\"":"")+" onkeydown=\"if(event.key===\'Enter\')sub("+q.id+")\"><button class=\"sbtn\" "+(lk?"disabled":"")+" onclick=\"sub("+q.id+")\">Valider</button></div>"}else if(q.type==="bits"){const lk=a!==undefined;const val=lk?(S.answered[q.id+"_bv"]||0):0;h+="<div class=\"builder\"><div class=\"bit-label\">";for(let i=q.bits-1;i>=0;i--)h+="<span>2<sup>"+i+"</sup></span>";h+="</div><div class=\"bit-board\" id=\"bb-"+q.id+"\">";for(let i=q.bits-1;i>=0;i--){const on=((lk?val:0)>>i)&1;h+="<div class=\"bit"+(on?" on":"")+(lk?" lk":"")+"\" data-q=\""+q.id+"\" data-i=\""+i+"\" "+(lk?"":"onclick=\"toggleBit(this)\"")+">"+on+"</div>"}h+="</div><div class=\"result\">Valeur: <b id=\"bv-"+q.id+"\">"+( lk?val:0)+"</b></div>";if(!lk)h+="<button class=\"sbtn\" onclick=\"subBits("+q.id+")\">Valider</button>";h+="</div>"}h+="<div class=\"expl "+(a!==undefined?"show":"")+"\" id=\"e-"+q.id+"\"><div class=\"ebox\">"+q.explanation+"</div></div>";if(a!==undefined)h+="<div class=\"rstq\"><button onclick=\"rstOne("+q.id+")\">↩ Réessayer</button></div>";card.innerHTML=h;if(only){const old=document.getElementById("c-"+q.id);if(old)old.replaceWith(card)}else c.appendChild(card)});updProg()}
function toggleBit(el){el.classList.toggle("on");el.textContent=el.classList.contains("on")?"1":"0";const qid=parseInt(el.dataset.q);const board=document.getElementById("bb-"+qid);let val=0;board.querySelectorAll(".bit").forEach(b=>{if(b.classList.contains("on"))val+=(1<<parseInt(b.dataset.i))});document.getElementById("bv-"+qid).textContent=val}
function subBits(id){const q=Q.find(x=>x.id===id);const board=document.getElementById("bb-"+id);let val=0;board.querySelectorAll(".bit").forEach(b=>{if(b.classList.contains("on"))val+=(1<<parseInt(b.dataset.i))});rec(id,val===q.target,{bv:val})}
function pickMCQ(id,p){const q=Q.find(x=>x.id===id);rec(id,p===q.answer,{p})}
function sub(id){const inp=document.getElementById("i-"+id);if(!inp||!inp.value.trim())return;const q=Q.find(x=>x.id===id);const v=inp.value.trim();const ok=q.accept?q.accept.some(a=>a.toLowerCase()===v.toLowerCase()):v.toLowerCase()===q.answer.toLowerCase();rec(id,ok,{v})}
function rec(id,ok,extra){if(S.answered[id]!==undefined)return;S.answered[id]=ok;if(extra.p!==undefined)S.answered[id+"_p"]=extra.p;if(extra.v!==undefined)S.answered[id+"_v"]=extra.v;if(extra.bv!==undefined)S.answered[id+"_bv"]=extra.bv;if(ok)S.right++;else{S.wrong++;if(!S.errors[id])S.errors[id]=0;S.errors[id]++}saveS();render([id])}
function rstOne(id){const was=S.answered[id];delete S.answered[id];delete S.answered[id+"_p"];delete S.answered[id+"_v"];delete S.answered[id+"_bv"];if(was===true)S.right=Math.max(0,S.right-1);else if(was===false)S.wrong=Math.max(0,S.wrong-1);saveS();render([id])}
function resetAll(){if(!confirm("Réinitialiser ?"))return;S={answered:{},right:0,wrong:0,errors:{}};try{localStorage.removeItem(SK)}catch(e){}saveS();render()}
function updProg(){const t=Q.length;const d=Object.keys(S.answered).filter(k=>!k.includes("_")).length;const te=S.errors?Object.values(S.errors).reduce((a,b)=>a+b,0):0;document.getElementById("sR").textContent=S.right;document.getElementById("sW").textContent=S.wrong;document.getElementById("sE").textContent=te;document.getElementById("progTxt").textContent=d+" / "+t;document.getElementById("fp").textContent=d;document.getElementById("ft").textContent=t;document.getElementById("pb").style.width=(d/t*100)+"%"}
render();</script></body></html>
