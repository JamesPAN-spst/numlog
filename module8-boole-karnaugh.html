<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#2d333b;--accent:#06b6d4;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--purple:#a78bfa;--txt:#e6edf3;--txt2:#8b949e;--txt3:#484f58;--radius:10px;--font:-apple-system,'Segoe UI',sans-serif;--mono:'Fira Code',monospace}body{background:var(--bg);color:var(--txt);font-family:var(--font);line-height:1.65;min-height:100vh}a{color:var(--accent);text-decoration:none}
.header{background:var(--bg2);border-bottom:1px solid var(--bg3);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);flex-wrap:wrap}.header .back{font-size:1.3rem;opacity:.7}.header h1{font-size:1.05rem;font-weight:600;color:var(--accent)}.badge{background:rgba(6,182,212,.1);color:var(--accent);font-size:.68rem;padding:3px 10px;border-radius:20px;font-weight:600}.cours-link{margin-left:auto;background:rgba(167,139,250,.12);color:var(--purple);padding:5px 14px;border-radius:7px;font-size:.78rem;font-weight:600;border:1px solid rgba(167,139,250,.2)}.score{display:flex;gap:10px;font-size:.82rem;color:var(--txt2);margin-left:12px}.score .g{color:var(--green);font-weight:700}.score .r{color:var(--red);font-weight:700}.score .o{color:var(--orange);font-weight:700}
.container{max-width:860px;margin:0 auto;padding:20px 20px 80px}.qcard{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:20px;margin-bottom:16px;transition:border-color .3s}.qcard.correct{border-color:var(--green)}.qcard.wrong{border-color:var(--red)}.qhdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}.qnum{background:var(--bg3);color:var(--accent);font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:6px}.qdiff{font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:600}.qdiff.easy{background:rgba(34,197,94,.1);color:var(--green)}.qdiff.medium{background:rgba(245,158,11,.1);color:var(--orange)}.qdiff.hard{background:rgba(239,68,68,.1);color:var(--red)}.qtext{font-size:.92rem;margin-bottom:14px;line-height:1.7}.qtext code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:.88em}
.opts{display:flex;flex-direction:column;gap:8px}.opt{background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:11px 16px;cursor:pointer;font-size:.88rem;transition:.2s;display:flex;align-items:center;gap:10px}.opt:hover:not(.locked){border-color:var(--accent)}.opt.c-right{border-color:var(--green);background:rgba(34,197,94,.08)}.opt.c-wrong{border-color:var(--red);background:rgba(239,68,68,.06)}.opt .marker{width:20px;height:20px;border-radius:50%;border:2px solid var(--txt3);display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}.opt.sel .marker{border-color:var(--accent);background:var(--accent);color:#fff}.opt.c-right .marker{border-color:var(--green);background:var(--green);color:#fff}.opt.c-wrong .marker{border-color:var(--red);background:var(--red);color:#fff}
.input-row{display:flex;gap:8px}.input-row input{background:var(--bg);border:1px solid var(--bg3);color:var(--txt);padding:9px 14px;border-radius:8px;font-size:.9rem;font-family:var(--mono);flex:1;outline:none}.input-row input:focus{border-color:var(--accent)}.input-row input.c-right{border-color:var(--green)}.input-row input.c-wrong{border-color:var(--red)}.submit-btn{background:var(--accent);color:#fff;border:none;padding:9px 20px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:var(--font)}.submit-btn:disabled{opacity:.4}
.expl{margin-top:12px;padding:12px 16px;border-radius:8px;font-size:.82rem;line-height:1.6;display:none}.expl.show{display:block}.expl.right{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);color:#a7f3d0}.expl.wrong{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);color:#fca5a5}.errcnt{font-size:.7rem;color:var(--orange);margin-left:auto}.rstq{margin-top:8px;text-align:right}.rstq button{background:transparent;border:1px dashed var(--txt3);color:var(--txt2);border-radius:6px;padding:4px 10px;font-size:.72rem;cursor:pointer;font-family:var(--font)}.rstq button:hover{border-color:var(--accent);color:var(--accent)}
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg3);padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:16px;z-index:100}.footer .pt{font-size:.82rem;color:var(--txt2)}.footer .pt b{color:var(--accent)}.pbar{flex:1;max-width:260px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}.pfill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}.fbtn{background:transparent;border:1px solid var(--txt3);color:var(--txt2);border-radius:8px;padding:5px 14px;font-size:.78rem;cursor:pointer;font-family:var(--font);font-weight:600}.fbtn:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:600px){.header{padding:10px 14px;gap:8px}.container{padding:14px 10px 80px}}

<body>
<div class="header"><a href="index.html" class="back">←</a><h1>M8 — Algèbre de Boole & Karnaugh</h1><span class="badge">booléen · mintermes · Karnaugh</span><a href="cours8-boole-karnaugh.html" class="cours-link">📚 Cours</a><div class="score"><span>✓ <span class="g" id="sR">0</span></span><span>✗ <span class="r" id="sW">0</span></span><span>↻ <span class="o" id="sE">0</span></span></div></div>
<div class="container"><div id="qc"></div></div>
<div class="footer"><span class="pt"><b id="fp">0</b>/<b id="ft">14</b></span><div class="pbar"><div class="pfill" id="pb" style="width:0%"></div></div><button class="fbtn" onclick="resetAll()">🗑️ Reset</button></div>
<script>
const STATE_KEY="nl_mod8_state";
const Q=[
{id:1,type:"mcq",diff:"easy",text:"En algèbre de Boole, l'opération <code>+</code> correspond au connecteur logique :",opts:["∧ (ET)","∨ (OU)","→ (implique)","⟷ (équivaut)"],answer:1,explanation:"En calcul booléen : + correspond à ∨ (OR), · correspond à ∧ (AND), et la barre (ā) correspond à ¬ (NOT)."},

{id:2,type:"mcq",diff:"easy",text:"Quelle propriété booléenne dit que <code>a + a = a</code> ?",opts:["Commutativité","Associativité","Idempotence","Complémentarité"],answer:2,explanation:"<b>Idempotence</b> : a + a = a et a · a = a. Contrairement à l'arithmétique classique, en booléen 1+1 = 1."},

{id:3,type:"mcq",diff:"easy",text:"Par les lois de De Morgan en notation booléenne, <code>a̅·̅b̅</code> (complément de a·b) vaut :",opts:["ā · b̄","ā + b̄","a + b","a · b"],answer:1,explanation:"De Morgan : le complément d'un produit est la somme des compléments. <span style='text-decoration:overline'>a·b</span> = ā + b̄."},

{id:4,type:"mcq",diff:"easy",text:"En booléen, <code>a + 1</code> vaut :",opts:["a","1","0","ā"],answer:1,explanation:"1 est l'<b>élément absorbant</b> de l'addition booléenne : a + 1 = 1 (toujours vrai, quel que soit a)."},

{id:5,type:"mcq",diff:"medium",text:"La simplification booléenne <code>a + ā·b</code> donne :",opts:["a·b","a + b","ā + b","a"],answer:1,explanation:"Identité utile : a + ā·b = a + b. Preuve : (a+ā)·(a+b) = 1·(a+b) = a+b."},

{id:6,type:"mcq",diff:"medium",text:"Un <b>minterme</b> pour 3 variables (a,b,c) est :",opts:["Une somme contenant chaque variable une fois","Un produit contenant chaque variable (ou sa négation) une seule fois, tel que m=1 → f=1","N'importe quelle conjonction de littéraux","Un terme de la FNC"],answer:1,explanation:"Un minterme est un <b>produit</b> de toutes les variables (sous forme positive ou niée), qui vaut 1 pour une seule distribution. La FND est la somme des mintermes."},

{id:7,type:"mcq",diff:"medium",text:"Dans une table de Karnaugh, les lignes et colonnes sont numérotées en :",opts:["Binaire naturel (00, 01, 10, 11)","Code de Gray (00, 01, 11, 10)","Décimal","Hexadécimal"],answer:1,explanation:"Le <b>code de Gray</b> (binaire réfléchi) garantit qu'entre deux cases adjacentes, <b>une seule variable change</b>. C'est la clé de la méthode Karnaugh."},

{id:8,type:"mcq",diff:"medium",text:"Pour obtenir la <b>FND simplifiée</b> par Karnaugh, on regroupe :",opts:["Les cases à 0","Les cases à 1 en blocs de puissances de 2","Les cases à 1 en blocs quelconques","Toutes les cases"],answer:1,explanation:"On regroupe les <b>1</b> en blocs rectangulaires de taille 1, 2, 4, 8... (puissances de 2), les plus grands possibles. Chaque bloc donne un terme simplifié."},

{id:9,type:"mcq",diff:"medium",text:"Pour obtenir la <b>FNC</b> par Karnaugh, on regroupe :",opts:["Les cases à 1","Les cases à 0, puis on complémente","Les cases à 0 directement","Les cases vides"],answer:1,explanation:"On regroupe les <b>0</b> pour obtenir la FND de F̄, puis on complémente (De Morgan) pour obtenir la FNC de F."},

{id:10,type:"input",diff:"medium",text:"Simplifier par calcul booléen : <code>ā·b̄·c̄·d̄ + ā·b̄·c̄·d + ā·b̄·c·d + ā·b̄·c·d̄</code>. Le résultat est un produit de deux littéraux.",answer:"a̅·b̅",accept:["ā·b̄","a̅·b̅","!a·!b","not a · not b","ā.b̄","na.nb"],explanation:"Les 4 termes ont en commun ā·b̄, et couvrent toutes les combinaisons de c et d. Donc la simplification donne <b>ā·b̄</b>."},

{id:11,type:"mcq",diff:"hard",text:"Simplifier <code>F = ā·b·c̄·d̄ + a·b·c·d + a·b̄·c·d + a·b·c̄·d̄</code> par Karnaugh :",opts:["a·c·d + b·c̄·d̄","a + b","(a+b)·(c+d)","a·b + c·d"],answer:0,explanation:"2 regroupements dans le Karnaugh : {a·b·c·d, a·b̄·c·d} → a·c·d et {ā·b·c̄·d̄, a·b·c̄·d̄} → b·c̄·d̄. Donc F = a·c·d + b·c̄·d̄."},

{id:12,type:"mcq",diff:"hard",text:"Dans le problème de criminologie : 4 hypothèses donnent F = (¬a∨c)∧d. Qui est certainement coupable ?",opts:["A","B","C","D"],answer:3,explanation:"F = (¬a∨c)∧d. Le facteur d apparaît dans tous les cas où F=1. Donc <b>D est certainement coupable</b> (d=1 est nécessaire pour F=1)."},

{id:13,type:"mcq",diff:"hard",text:"Dans une table de Karnaugh 4×4, les 4 coins forment-ils un regroupement valide ?",opts:["Oui, car ils sont tous adjacents en code de Gray","Non, les coins ne sont jamais adjacents","Seulement si la table est torique","Seulement 2 coins opposés"],answer:0,explanation:"Oui ! La table de Karnaugh est <b>torique</b> : le bord droit est adjacent au bord gauche, le haut au bas. Les 4 coins (0000, 0010, 1000, 1010) ne diffèrent que d'un bit entre voisins → regroupement valide."},

{id:14,type:"mcq",diff:"hard",text:"Pour un Karnaugh : F a pour table les 0 aux cases (ab,cd) = (00,00), (00,01), (01,01), (01,11). La FNC simplifiée est :",opts:["(a+c)·(b̄+d̄)","(a∨b)·(c∨d)","(ā+c̄)·(b+d)","Impossible à simplifier"],answer:0,explanation:"On regroupe les 0 : bloc1 {(00,00),(00,01)} → ā·b̄·d̄ non, on regarde les variables constantes dans le bloc des 0. Pour la FNC, on inverse les variables fixes des blocs de 0 pour former des maxtermes."}
];
let state;function loadState(){try{state=JSON.parse(localStorage.getItem(STATE_KEY))||{}}catch(e){state={}}if(!state.answered)state={answered:{},right:0,wrong:0,errorCounts:{}}}function saveState(){localStorage.setItem(STATE_KEY,JSON.stringify(state))}
function render(){loadState();const c=document.getElementById("qc");c.innerHTML="";let done=0;Q.forEach((q)=>{const ans=state.answered[q.id];const isDone=ans!==undefined;if(isDone)done++;const ec=state.errorCounts[q.id]||0;const div=document.createElement("div");div.className="qcard"+(isDone?(ans===true?" correct":" wrong"):"");let inner=`<div class="qhdr"><span class="qnum">Q${q.id}</span><span class="qdiff ${q.diff}">${q.diff}</span>${ec>0?`<span class="errcnt">↻ ${ec}</span>`:""}</div><div class="qtext">${q.text}</div>`;if(q.type==="mcq"){inner+=`<div class="opts">`;q.opts.forEach((o,oi)=>{let cls="opt";if(isDone){cls+=" locked";if(oi===q.answer)cls+=" c-right";else if(ans===false&&state.answered[q.id+"_sel"]===oi)cls+=" c-wrong";}inner+=`<div class="${cls}" onclick="pickMCQ(${q.id},${oi})"><div class="marker">${isDone?(oi===q.answer?"✓":(state.answered[q.id+"_sel"]===oi?"✗":"")):"ABCD"[oi]}</div><span>${o}</span></div>`;});inner+="</div>";}else{const val=isDone?(state.answered[q.id+"_val"]||""):"";inner+=`<div class="input-row"><input id="inp${q.id}" value="${val}" placeholder="Réponse..." ${isDone?"disabled":""} class="${isDone?(ans?"c-right":"c-wrong"):""}" onkeydown="if(event.key==='Enter')submitInput(${q.id})"><button class="submit-btn" onclick="submitInput(${q.id})" ${isDone?"disabled":""}>Vérifier</button></div>`;}inner+=`<div class="expl ${isDone?"show":""} ${isDone?(ans?"right":"wrong"):""}">${isDone?(ans?"✅ Correct — ":"❌ Incorrect — ")+q.explanation:""}</div>`;if(isDone)inner+=`<div class="rstq"><button onclick="resetQ(${q.id})">↻ Refaire</button></div>`;div.innerHTML=inner;c.appendChild(div);});updateScore(done);}
function pickMCQ(qid,oi){const q=Q.find(x=>x.id===qid);if(!q||state.answered[qid]!==undefined)return;const correct=oi===q.answer;state.answered[qid]=correct;state.answered[qid+"_sel"]=oi;if(correct)state.right++;else{state.wrong++;state.errorCounts[qid]=(state.errorCounts[qid]||0)+1;}saveState();render();}
function submitInput(qid){const q=Q.find(x=>x.id===qid);if(!q||state.answered[qid]!==undefined)return;const inp=document.getElementById("inp"+qid);const val=inp.value.trim();if(!val)return;const correct=q.accept.some(a=>val.toLowerCase().replace(/\s/g,'')===a.toLowerCase().replace(/\s/g,''));state.answered[qid]=correct;state.answered[qid+"_val"]=val;if(correct)state.right++;else{state.wrong++;state.errorCounts[qid]=(state.errorCounts[qid]||0)+1;}saveState();render();}
function resetQ(qid){delete state.answered[qid];delete state.answered[qid+"_sel"];delete state.answered[qid+"_val"];state.right=0;state.wrong=0;Q.forEach(qq=>{const a=state.answered[qq.id];if(a===true)state.right++;else if(a===false)state.wrong++;});saveState();render();}
function resetAll(){if(!confirm("Réinitialiser ce module ?"))return;localStorage.removeItem(STATE_KEY);render();}
function updateScore(done){document.getElementById("sR").textContent=state.right;document.getElementById("sW").textContent=state.wrong;const te=Object.values(state.errorCounts||{}).reduce((a,b)=>a+b,0);document.getElementById("sE").textContent=te;document.getElementById("fp").textContent=done;document.getElementById("pb").style.width=Math.round(done/Q.length*100)+"%";}
render();
</script>
</body>
