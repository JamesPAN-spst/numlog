<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M5 — Modulo | Quiz</title>
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1e293b;--accent:#3b82f6;--accent2:#2563eb;--accent-dim:rgba(59,130,246,.1);--green:#22c55e;--red:#ef4444;--orange:#f97316;--cyan:#06b6d4;--purple:#a78bfa;--txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;--radius:10px;--font:-apple-system,'Segoe UI','Noto Sans SC',sans-serif;--mono:'Fira Code','JetBrains Mono','Cascadia Code',monospace}body{background:var(--bg);color:var(--txt);font-family:var(--font);line-height:1.65}a{color:var(--accent)}.header{background:var(--bg2);border-bottom:1px solid rgba(59,130,246,.15);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}.header .back{font-size:1.3rem;opacity:.7}.header h1{font-size:1.05rem;font-weight:600;color:var(--accent)}.header .badge{background:var(--accent-dim);color:var(--accent);font-size:.68rem;padding:3px 10px;border-radius:20px;font-weight:600}.cours-link{margin-left:auto;background:rgba(167,139,250,.12);color:var(--purple);padding:5px 14px;border-radius:7px;font-size:.78rem;font-weight:600;border:1px solid rgba(167,139,250,.2)}.score{display:flex;gap:10px;font-size:.82rem;color:var(--txt2);margin-left:12px}.score .g{color:var(--green);font-weight:700}.score .r{color:var(--red);font-weight:700}.score .o{color:var(--orange);font-weight:700}.container{max-width:880px;margin:0 auto;padding:20px 20px 80px}.sec{font-size:1.1rem;font-weight:700;margin:28px 0 14px;padding-left:12px;border-left:3px solid var(--accent);display:flex;align-items:center;gap:10px}.sec .cnt{font-size:.72rem;background:var(--bg3);color:var(--txt2);padding:2px 10px;border-radius:20px}.qcard{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;transition:.3s}.qcard.ok{border-color:rgba(34,197,94,.35)}.qcard.fail{border-color:rgba(239,68,68,.35)}.qhead{padding:14px 18px 10px;display:flex;align-items:flex-start;gap:10px}.qn{font-size:.68rem;font-weight:700;color:var(--bg);background:var(--accent);min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}.qn.dok{background:var(--green)}.qn.dng{background:var(--red)}.qtxt{font-size:.9rem;flex:1}.qtxt code{background:var(--bg);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:.84rem;color:var(--cyan)}.dtag{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}.dtag.easy{background:rgba(34,197,94,.12);color:var(--green)}.dtag.medium{background:rgba(249,115,22,.12);color:var(--orange)}.dtag.hard{background:rgba(239,68,68,.12);color:var(--red)}.errcnt{font-size:.65rem;color:var(--orange);margin-left:6px}.opts{padding:4px 18px 14px}.obtn{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:10px 14px;margin:5px 0;color:var(--txt);font-size:.86rem;cursor:pointer;transition:.2s;font-family:var(--font)}.obtn:hover:not(.lk){background:var(--bg3)}.obtn.sg{background:rgba(34,197,94,.08);border-color:var(--green);color:var(--green)}.obtn.sw{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red)}.obtn.rv{border-color:rgba(34,197,94,.25);color:var(--green)}.obtn.lk{cursor:default;opacity:.85}.iarea{padding:4px 18px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.iarea input{flex:1;min-width:120px;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:10px 14px;color:var(--txt);font-family:var(--mono);font-size:.88rem;outline:none}.iarea input:focus{border-color:var(--accent)}.iarea input.ig{border-color:var(--green);color:var(--green)}.iarea input.ir{border-color:var(--red);color:var(--red)}.sbtn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:.84rem;font-family:var(--font)}.sbtn:disabled{opacity:.4}.expl{padding:0 18px 14px;display:none}.expl.show{display:block}.ebox{background:rgba(59,130,246,.06);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 16px;font-size:.84rem;color:var(--txt2);line-height:1.7}.ebox code{background:var(--bg);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:.8rem;color:var(--cyan)}.rstq{padding:0 18px 12px}.rstq button{background:transparent;border:1px dashed var(--txt3);color:var(--txt2);border-radius:6px;padding:5px 12px;font-size:.75rem;cursor:pointer;font-family:var(--font)}.rstq button:hover{border-color:var(--accent);color:var(--accent);border-style:solid}.footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg3);padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:16px;z-index:100}.footer .pt{font-size:.82rem;color:var(--txt2)}.footer .pt b{color:var(--accent)}.pbar{flex:1;max-width:260px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}.pfill{height:100%;background:var(--accent);border-radius:3px;transition:.4s}.fbtn{background:transparent;border:1px solid var(--txt3);color:var(--txt2);border-radius:8px;padding:5px 14px;font-size:.78rem;cursor:pointer;font-family:var(--font);font-weight:600}.fbtn:hover{border-color:var(--accent);color:var(--accent)}</style>
</head>
<body>
<div class="header"><a href="index.html" class="back">←</a><h1>M5 — Arithmétique modulaire</h1><span class="badge">MODULO · FERMAT</span><a href="courses5.html" class="cours-link">📚 Cours</a><div class="score"><span>✓ <span class="g" id="sR">0</span></span><span>✗ <span class="r" id="sW">0</span></span><span>↻ <span class="o" id="sE">0</span></span></div></div>
<div class="container">
<div class="sec">🧠 Quiz <span class="cnt" id="progTxt">0 / 10</span></div>
<div id="qc"></div>
</div>
<div class="footer"><span class="pt"><b id="fp">0</b> / <b id="ft">10</b></span><div class="pbar"><div class="pfill" id="pb" style="width:0%"></div></div><button class="fbtn" onclick="resetAll()">🗑️ Réinitialiser</button></div>
<script>
const Q=[
  {id:1,type:"input",diff:"easy",text:"Calculer <code>17 mod 5</code>.",answer:"2",accept:["2"],explanation:"17 = 3×5 + 2. Reste = <b>2</b>."},
  {id:2,type:"input",diff:"medium",text:"Calculer <code>3⁴ mod 4</code>.",answer:"1",accept:["1"],explanation:"3⁴ = 81 = 20×4 + 1. Donc 81 ≡ <b>1</b> (mod 4)."},
  {id:3,type:"input",diff:"medium",text:"Calculer <code>51⁴ mod 4</code>.",answer:"1",accept:["1"],explanation:"51 ≡ 3 (mod 4). 3⁴ = 81 ≡ 1 (mod 4). Donc 51⁴ ≡ <b>1</b> (mod 4)."},
  {id:4,type:"input",diff:"hard",text:"Calculer <code>39⁴ mod 4</code>.",answer:"1",accept:["1"],explanation:"39 = 9×4+3, donc 39 ≡ 3 (mod 4). 3⁴ = 81 = 20×4+1 ≡ <b>1</b> (mod 4)."},
  {id:5,type:"mcq",diff:"medium",text:"Petit théorème de Fermat : si p est premier et p ne divise pas a, alors :",options:["a^p ≡ 1 (mod p)","a^(p−1) ≡ 1 (mod p)","a^p ≡ a (mod p)","a^(p+1) ≡ 1 (mod p)"],answer:1,explanation:"Le petit théorème de Fermat dit <b>a^(p−1) ≡ 1 (mod p)</b>. Note : a^p ≡ a (mod p) est aussi vrai mais c'est une autre formulation."},
  {id:6,type:"mcq",diff:"hard",text:"Pour x non multiple de 7, pourquoi x¹² − 1 est-il multiple de 7 ?",options:["Car 12 est pair","Car x⁶ ≡ 1 (mod 7) par Fermat, donc x¹² = (x⁶)² ≡ 1","Car 7 est premier et 7 divise 12","Car x¹² est toujours impair"],answer:1,explanation:"7 est premier. Fermat : x⁶ ≡ 1 (mod 7). Donc x¹² = (x⁶)² ≡ 1² = 1 (mod 7). Ainsi x¹² − 1 ≡ 0."},
  {id:7,type:"input",diff:"easy",text:"<code>−3 mod 7</code> = ? <br><small>(résultat entre 0 et 6)</small>",answer:"4",accept:["4"],explanation:"−3 + 7 = 4. Donc −3 ≡ <b>4</b> (mod 7)."},
  {id:8,type:"input",diff:"medium",text:"Calculer <code>2¹⁰ mod 7</code>.<br><small>Indice : 2⁶ ≡ ? (mod 7) par Fermat</small>",answer:"2",accept:["2"],explanation:"Fermat (7 premier) : 2⁶ ≡ 1 (mod 7). Donc 2¹⁰ = 2⁶ × 2⁴ ≡ 1 × 16 ≡ 16 mod 7 = <b>2</b>."},
  {id:9,type:"mcq",diff:"easy",text:"Un nombre en base 10 terminant par 00 est divisible par :",options:["10","50","100","1000"],answer:2,explanation:"Terminer par 00 en base 10 = divisible par 10² = <b>100</b>."},
  {id:10,type:"mcq",diff:"medium",text:"Le CA2 sur n bits fonctionne grâce à l'arithmétique modulo :",options:["2^n","2^(n−1)","n","2n"],answer:0,explanation:"Sur n bits, toutes les opérations se font modulo <b>2ⁿ</b>. Sur 8 bits : modulo 256."}
];

const SK="nl_m5";let S=loadS();function loadS(){try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s)}catch(e){}return{answered:{},right:0,wrong:0,errors:{}}}function saveS(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}
function render(only){const c=document.getElementById("qc");if(!only)c.innerHTML="";const qs=only?Q.filter(q=>only.includes(q.id)):Q;qs.forEach(q=>{const card=document.createElement("div");card.className="qcard";card.id="c-"+q.id;const a=S.answered[q.id];if(a!==undefined)card.classList.add(a?"ok":"fail");let nc="qn";if(a===true)nc+=" dok";else if(a===false)nc+=" dng";const dl=q.diff==="easy"?"Facile":q.diff==="medium"?"Moyen":"Difficile";const errs=S.errors[q.id]||0;const errH=errs?`<span class="errcnt">↻${errs}</span>`:"";let h=`<div class="qhead"><div class="${nc}">${q.id}</div><div class="qtxt">${q.text}</div><span class="dtag ${q.diff}">${dl}</span>${errH}</div>`;if(q.type==="mcq"){h+=`<div class="opts">`;q.options.forEach((o,i)=>{let cl="obtn";if(a!==undefined){cl+=" lk";if(i===q.answer)cl+=" rv";if(a===false&&S.answered[q.id+"_p"]===i)cl+=" sw";if(a===true&&i===q.answer)cl="obtn lk sg"}h+=`<button class="${cl}" ${a!==undefined?"disabled":""} onclick="pickMCQ(${q.id},${i})">${o}</button>`});h+=`</div>`}else if(q.type==="input"){const lk=a!==undefined;const ic=a===true?"ig":a===false?"ir":"";const sv=lk?(S.answered[q.id+"_v"]||"").replace(/"/g,"&quot;"):"";h+=`<div class="iarea"><input type="text" id="i-${q.id}" class="${ic}" placeholder="Réponse..." ${lk?"disabled":""} ${lk?`value="${sv}"`:""} onkeydown="if(event.key==='Enter')sub(${q.id})"><button class="sbtn" ${lk?"disabled":""} onclick="sub(${q.id})">Valider</button></div>`}h+=`<div class="expl ${a!==undefined?"show":""}" id="e-${q.id}"><div class="ebox">${q.explanation}</div></div>`;if(a!==undefined)h+=`<div class="rstq"><button onclick="rstOne(${q.id})">↩ Réessayer</button></div>`;card.innerHTML=h;if(only){const old=document.getElementById("c-"+q.id);if(old)old.replaceWith(card)}else c.appendChild(card)});updProg()}
function pickMCQ(id,p){const q=Q.find(x=>x.id===id);rec(id,p===q.answer,{p})}
function sub(id){const inp=document.getElementById("i-"+id);if(!inp||!inp.value.trim())return;const q=Q.find(x=>x.id===id);const v=inp.value.trim();const ok=q.accept?q.accept.some(a=>a.toLowerCase()===v.toLowerCase()):v.toLowerCase()===q.answer.toLowerCase();rec(id,ok,{v})}
function rec(id,ok,extra){if(S.answered[id]!==undefined)return;S.answered[id]=ok;if(extra.p!==undefined)S.answered[id+"_p"]=extra.p;if(extra.v!==undefined)S.answered[id+"_v"]=extra.v;if(ok)S.right++;else{S.wrong++;if(!S.errors[id])S.errors[id]=0;S.errors[id]++}saveS();render([id])}
function rstOne(id){const was=S.answered[id];delete S.answered[id];delete S.answered[id+"_p"];delete S.answered[id+"_v"];if(was===true)S.right=Math.max(0,S.right-1);else if(was===false)S.wrong=Math.max(0,S.wrong-1);saveS();render([id])}
function resetAll(){if(!confirm("Réinitialiser ?"))return;S={answered:{},right:0,wrong:0,errors:{}};try{localStorage.removeItem(SK)}catch(e){}saveS();render()}
function updProg(){const t=Q.length,d=Object.keys(S.answered).filter(k=>!k.includes("_")).length,te=S.errors?Object.values(S.errors).reduce((a,b)=>a+b,0):0;document.getElementById("sR").textContent=S.right;document.getElementById("sW").textContent=S.wrong;document.getElementById("sE").textContent=te;document.getElementById("progTxt").textContent=d+" / "+t;document.getElementById("fp").textContent=d;document.getElementById("ft").textContent=t;document.getElementById("pb").style.width=(d/t*100)+"%"}
render();
</script>
</body>
</html>
